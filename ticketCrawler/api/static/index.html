<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PyTickets Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f7f9;
      color: #1d252d;
    }
    body { margin: 0; }
    header {
      background: #1f2933;
      color: white;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 { font-size: 22px; margin: 0; letter-spacing: 0; }
    main { max-width: 1180px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .panel {
      background: white;
      border: 1px solid #d7dce2;
      border-radius: 6px;
      padding: 16px;
    }
    .metric { font-size: 28px; font-weight: 700; margin-top: 6px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid #e3e7eb; padding: 9px 7px; text-align: left; }
    th { color: #52616f; font-weight: 700; }
    button {
      border: 1px solid #8aa0b2;
      background: #ffffff;
      color: #1f2933;
      border-radius: 5px;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover { background: #eef3f7; }
    input, select {
      border: 1px solid #bac4ce;
      border-radius: 5px;
      padding: 8px;
      min-width: 0;
    }
    form { display: grid; grid-template-columns: 1fr 2fr 120px 90px; gap: 8px; }
    section { margin-top: 18px; }
    a { color: #075985; }
    @media (max-width: 800px) {
      .grid, form { grid-template-columns: 1fr; }
      main { padding: 14px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>PyTickets</h1>
    <button onclick="refresh()">Refresh</button>
  </header>
  <main>
    <div class="grid">
      <div class="panel"><div>Tickets</div><div class="metric" id="tickets-count">0</div></div>
      <div class="panel"><div>Notified</div><div class="metric" id="notified-count">0</div></div>
      <div class="panel"><div>Crawl Runs</div><div class="metric" id="runs-count">0</div></div>
    </div>

    <section class="panel">
      <h2>Schedule Crawl</h2>
      <form onsubmit="scheduleJob(event)">
        <select id="site"></select>
        <input id="url" placeholder="Event URL">
        <input id="interval" type="number" step="0.5" value="2" min="0.1">
        <button type="submit">Schedule</button>
      </form>
    </section>

    <section class="panel">
      <h2>Recent Tickets</h2>
      <table>
        <thead><tr><th>Site</th><th>Link</th><th>Status</th><th>Found</th></tr></thead>
        <tbody id="tickets"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Jobs</h2>
      <table>
        <thead><tr><th>ID</th><th>Next Run</th><th>Trigger</th></tr></thead>
        <tbody id="jobs"></tbody>
      </table>
    </section>
  </main>
  <script>
    async function getJson(url) {
      const response = await fetch(url);
      return response.json();
    }

    async function refresh() {
      const health = await getJson('/api/health');
      document.getElementById('tickets-count').textContent = health.summary.tickets;
      document.getElementById('notified-count').textContent = health.summary.notified;
      document.getElementById('runs-count').textContent = health.summary.crawl_runs;

      const sites = await getJson('/api/sites');
      document.getElementById('site').innerHTML = sites.sites
        .map(site => `<option value="${site}">${site}</option>`).join('');

      const tickets = await getJson('/api/tickets?limit=25');
      document.getElementById('tickets').innerHTML = tickets.tickets.map(ticket => `
        <tr>
          <td>${ticket.site}</td>
          <td><a href="${ticket.url}" target="_blank" rel="noreferrer">Open</a></td>
          <td>${ticket.notification_status || ''}</td>
          <td>${ticket.found_at}</td>
        </tr>
      `).join('');

      const jobs = await getJson('/api/jobs');
      document.getElementById('jobs').innerHTML = jobs.jobs.map(job => `
        <tr><td>${job.id}</td><td>${job.next_run_time}</td><td>${job.trigger}</td></tr>
      `).join('');
    }

    async function scheduleJob(event) {
      event.preventDefault();
      await fetch('/api/jobs', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          site: document.getElementById('site').value,
          url: document.getElementById('url').value,
          interval_hours: Number(document.getElementById('interval').value)
        })
      });
      refresh();
    }

    refresh();
  </script>
</body>
</html>
